apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Source: GitOps repo where k8s manifests live
  source:
    repoURL: https://github.com/saharhamraoui/PFE-GitOps.git
    targetRevision: main
    path: k8s

  # Destination: AKS cluster (in-cluster = ArgoCD is deployed on same cluster)
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true       # remove resources deleted from git
      selfHeal: true    # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
